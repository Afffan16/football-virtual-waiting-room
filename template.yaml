AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Football Virtual Waiting Room — AWS Builder Center DynamoDB Data Modeling Challenge.
  Serverless queue management system using Single Table Design.

Globals:
  Function:
    Runtime: python3.14
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        TABLE_NAME: !Ref FootballWaitingRoomTable
        LOG_LEVEL: INFO
        # Security — injected at deploy time; never hardcoded here
        ADMIN_API_KEY: !Ref AdminApiKey
        ADMIN_EMAIL: !Ref AdminEmail
        ADMIN_PASSWORD: !Ref AdminPassword
        QUEUE_SHARD_COUNT: !Ref QueueShardCount
    LoggingConfig:
      LogFormat: JSON

Parameters:
  StageName:
    Type: String
    Default: Prod
    Description: API Gateway deployment stage name
  TokenTTLMinutes:
    Type: Number
    Default: 15
    Description: Admission token lifetime in minutes
  SessionTTLMinutes:
    Type: Number
    Default: 30
    Description: Session lifetime in minutes
  DefaultBatchSize:
    Type: Number
    Default: 50
    Description: Default admission batch size
  PurchasingCapacity:
    Type: Number
    Default: 1000
    Description: >
      Maximum number of fans in the ADMITTED (active purchasing) state at once.
      The admit endpoint in capacity-aware mode (capacityMode=true) will only
      admit enough fans to fill up to this limit.
  QueueShardCount:
    Type: Number
    Default: 16
    Description: Number of deterministic event queue shards used for hot-partition avoidance.
  AdminApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      API key value for the admin (x-admin-api-key header). Leave blank to
      auto-generate a placeholder. Set via --parameter-overrides at deploy time.
      Store the real value in AWS Secrets Manager in production.
  AdminEmail:
    Type: String
    Default: admin123@gmail.com
    Description: Demo admin login email.
  AdminPassword:
    Type: String
    NoEcho: true
    Default: admin123
    Description: Demo admin login password. Use Secrets Manager in production.

Resources:
  # ==========================================================================
  # DynamoDB Table — Single Table Design
  # ==========================================================================
  FootballWaitingRoomTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: GSI3PK
          AttributeType: S
        - AttributeName: GSI3SK
          AttributeType: S
      GlobalSecondaryIndexes:
        # GSI1 — User Queue Lookup
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - queuePosition
              - status
              - joinTime
              - estimatedWait
              - eventId
              - userId
              - entityType
        # GSI2 — Token Lookup
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - tokenId
              - userId
              - eventId
              - status
              - expiresAt
              - entityType
        # GSI3 — Administrative Queue View
        - IndexName: GSI3
          KeySchema:
            - AttributeName: GSI3PK
              KeyType: HASH
            - AttributeName: GSI3SK
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - queuePosition
              - status
              - userId
              - entityType
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: FootballWaitingRoom
        - Key: Environment
          Value: !Ref StageName

  # ==========================================================================
  # API Gateway
  # ==========================================================================
  WaitingRoomApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref StageName
      Description: Football Virtual Waiting Room REST API
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,Idempotency-Key,x-admin-api-key,x-admin-email,x-admin-password'"
        AllowOrigin: "'*'"
      # Throttle per-stage to protect against abuse
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 5000
          ThrottlingRateLimit: 2000

  # --------------------------------------------------------------------------
  # API Key + Usage Plan — controls who can call POST /queue/admit (admin ops)
  # and provides a general rate-limiting tier for all callers.
  # --------------------------------------------------------------------------
  WaitingRoomApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub "FootballWaitingRoom-${StageName}-Key"
      Description: API key for Football Virtual Waiting Room — admin and rate-limiting tier
      Enabled: true

  WaitingRoomUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Sub "FootballWaitingRoom-${StageName}-Plan"
      Description: Throttling and quota plan for the waiting-room API
      ApiStages:
        - ApiId: !Ref WaitingRoomApi
          Stage: !Ref StageName
      Throttle:
        BurstLimit: 5000
        RateLimit: 2000
      Quota:
        Limit: 1000000
        Period: DAY

  WaitingRoomUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref WaitingRoomApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref WaitingRoomUsagePlan


  # ==========================================================================
  # Lambda Functions
  # ==========================================================================

  # --- Join Queue ---
  JoinQueueFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Registers a user in the waiting room queue
      CodeUri: src/
      Handler: join_queue.app.lambda_handler
      Environment:
        Variables:
          TOKEN_TTL_MINUTES: !Ref TokenTTLMinutes
          SESSION_TTL_MINUTES: !Ref SessionTTLMinutes
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FootballWaitingRoomTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:TransactWriteItems
              Resource: !GetAtt FootballWaitingRoomTable.Arn
      Events:
        JoinQueue:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /queue/join
            Method: POST

  # --- Queue Status ---
  QueueStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Retrieves current queue status for a user
      CodeUri: src/
      Handler: queue_status.app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FootballWaitingRoomTable
      Events:
        QueueStatus:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /queue/status
            Method: GET

  # --- Leave Queue ---
  LeaveQueueFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Allows a user to voluntarily leave the queue
      CodeUri: src/
      Handler: leave_queue.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FootballWaitingRoomTable
      Events:
        LeaveQueue:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /queue/leave
            Method: POST

  # --- Admit Users ---
  AdmitUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Admits the next batch of waiting users
      CodeUri: src/
      Handler: admit_users.app.lambda_handler
      Timeout: 60
      Environment:
        Variables:
          DEFAULT_BATCH_SIZE: !Ref DefaultBatchSize
          TOKEN_TTL_MINUTES: !Ref TokenTTLMinutes
          PURCHASING_CAPACITY: !Ref PurchasingCapacity
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FootballWaitingRoomTable
      Events:
        AdmitUsers:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /queue/admit
            Method: POST

  # --- Admin Queue List ---
  AdminQueueListFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Lists real queue entries for admin dashboard views
      CodeUri: src/
      Handler: admin_queue_list.app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FootballWaitingRoomTable
      Events:
        AdminQueueList:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /queue/admin/list
            Method: GET

  # --- Validate Token ---
  ValidateTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Validates an admission token before checkout
      CodeUri: src/
      Handler: validate_token.app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FootballWaitingRoomTable
      Events:
        ValidateToken:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /token/validate
            Method: POST

  # --- Event Lookup ---
  EventLookupFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Returns metadata for a football event
      CodeUri: src/
      Handler: event_lookup.app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FootballWaitingRoomTable
      Events:
        EventLookup:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /event/{eventId}
            Method: GET

  # --- Events List ---
  EventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Lists all football events for the frontend catalog
      CodeUri: src/
      Handler: events.app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FootballWaitingRoomTable
      Events:
        EventsList:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /events
            Method: GET

  # --- Admin Event Create ---
  AdminEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Creates a new football event and initial stats record
      CodeUri: src/
      Handler: admin_event.app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FootballWaitingRoomTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:TransactWriteItems
              Resource: !GetAtt FootballWaitingRoomTable.Arn
      Events:
        AdminEventCreate:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /event
            Method: POST

  # --- Statistics ---
  StatisticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Returns aggregate queue statistics for an event
      CodeUri: src/
      Handler: statistics.app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FootballWaitingRoomTable
      Events:
        Statistics:
          Type: Api
          Properties:
            RestApiId: !Ref WaitingRoomApi
            Path: /event/{eventId}/stats
            Method: GET

# ==========================================================================
# Outputs
# ==========================================================================
Outputs:
  WaitingRoomApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${WaitingRoomApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}/"

  FootballWaitingRoomTableName:
    Description: DynamoDB table name
    Value: !Ref FootballWaitingRoomTable

  FootballWaitingRoomTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt FootballWaitingRoomTable.Arn

  FootballWaitingRoomStreamArn:
    Description: DynamoDB Streams ARN
    Value: !GetAtt FootballWaitingRoomTable.StreamArn

  WaitingRoomApiKeyId:
    Description: API Gateway API Key ID (retrieve value from console or CLI — never printed in plain text)
    Value: !Ref WaitingRoomApiKey

  JoinQueueFunctionArn:
    Description: Join Queue Lambda ARN
    Value: !GetAtt JoinQueueFunction.Arn

  QueueStatusFunctionArn:
    Description: Queue Status Lambda ARN
    Value: !GetAtt QueueStatusFunction.Arn

  LeaveQueueFunctionArn:
    Description: Leave Queue Lambda ARN
    Value: !GetAtt LeaveQueueFunction.Arn

  AdmitUsersFunctionArn:
    Description: Admit Users Lambda ARN
    Value: !GetAtt AdmitUsersFunction.Arn

  AdminQueueListFunctionArn:
    Description: Admin Queue List Lambda ARN
    Value: !GetAtt AdminQueueListFunction.Arn

  ValidateTokenFunctionArn:
    Description: Validate Token Lambda ARN
    Value: !GetAtt ValidateTokenFunction.Arn

  EventLookupFunctionArn:
    Description: Event Lookup Lambda ARN
    Value: !GetAtt EventLookupFunction.Arn

  EventsFunctionArn:
    Description: Events List Lambda ARN
    Value: !GetAtt EventsFunction.Arn

  AdminEventFunctionArn:
    Description: Admin Event Create Lambda ARN
    Value: !GetAtt AdminEventFunction.Arn

  StatisticsFunctionArn:
    Description: Statistics Lambda ARN
    Value: !GetAtt StatisticsFunction.Arn
