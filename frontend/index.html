<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Virtual Waiting Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4053D6;
            --primary-hover: #5B6DE0;
            --accent: #FF9900;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-dark));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        button {
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        button:active::after {
            width: 200px;
            height: 200px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: var(--primary-hover); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }

        .btn-accent {
            background: var(--accent);
            color: #000;
            grid-column: span 2;
        }
        .btn-accent:hover { background: #e68a00; }

        .log-panel {
            display: flex;
            flex-direction: column;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .log-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        #log-output {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            color: #10b981;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid var(--glass-border);
            min-height: 400px;
        }
        
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <h1>Waiting Room</h1>
        <p class="subtitle">Experience extreme-scale DynamoDB.</p>

        <div class="input-group">
            <label>Event ID</label>
            <input type="text" id="eventId" value="1001" placeholder="e.g. 1001">
        </div>
        <div class="input-group">
            <label>User ID</label>
            <input type="text" id="userId" value="FAN-001" placeholder="e.g. FAN-001">
        </div>

        <div class="button-grid">
            <button class="btn-primary" onclick="joinQueue()">Join Queue</button>
            <button class="btn-secondary" onclick="checkStatus()">Check Status</button>
            <button class="btn-secondary" onclick="getStats()">View Queue Stats</button>
            <button class="btn-secondary" onclick="leaveQueue()">Leave Queue</button>
            <button class="btn-accent" onclick="adminAdmitUsers()">Admin: Admit Batch (10 users)</button>
        </div>
    </div>

    <div class="glass-panel log-panel">
        <div class="log-header">
            <h2>Live API Monitor</h2>
            <button class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="clearLog()">Clear</button>
        </div>
        <div id="log-output">System initialized. Ready for API requests.
Using endpoint: https://n20mxucrj4.execute-api.us-east-1.amazonaws.com/Prod</div>
    </div>
</div>

<script>
    const API_BASE = "https://n20mxucrj4.execute-api.us-east-1.amazonaws.com/Prod";
    const logEl = document.getElementById("log-output");

    function log(method, endpoint, response) {
        const time = new Date().toLocaleTimeString();
        const divider = "----------------------------------------\n";
        const msg = `[${time}] ${method} ${endpoint}\n${JSON.stringify(response, null, 2)}\n${divider}`;
        logEl.textContent = msg + logEl.textContent;
    }

    function clearLog() {
        logEl.textContent = "Log cleared.";
    }

    async function fetchApi(method, endpoint, body = null) {
        const url = `${API_BASE}${endpoint}`;
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' }
        };
        if (body) options.body = JSON.stringify(body);

        try {
            const res = await fetch(url, options);
            const data = await res.json();
            log(method, endpoint, data);
            return data;
        } catch (err) {
            log(method, endpoint, { error: err.message });
        }
    }

    function getValues() {
        return {
            eventId: document.getElementById('eventId').value || "1001",
            userId: document.getElementById('userId').value || "FAN-001"
        };
    }

    async function joinQueue() {
        const { eventId, userId } = getValues();
        await fetchApi('POST', '/queue/join', { eventId, userId });
    }

    async function checkStatus() {
        const { eventId, userId } = getValues();
        await fetchApi('GET', `/queue/status?eventId=${eventId}&userId=${userId}`);
    }

    async function leaveQueue() {
        const { eventId, userId } = getValues();
        await fetchApi('POST', '/queue/leave', { eventId, userId });
    }

    async function getStats() {
        const { eventId } = getValues();
        await fetchApi('GET', `/event/${eventId}/stats`);
    }

    async function adminAdmitUsers() {
        const { eventId } = getValues();
        await fetchApi('POST', '/queue/admit', { eventId, batchSize: 10 });
    }
</script>

</body>
</html>
